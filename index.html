<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#170B17" />
<title>Mundial '26 — Predictions League</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#170B17;--text:#FFFFFF;--text-2:#C9B5C0;--text-3:#8C7682;
  --lime:#FFB54D;--gold:#FFB54D;--violet:#FF4D9E;--green:#41E0A0;--live:#FF5C8A;
  --glass:rgba(255,255,255,.06);--glass-2:rgba(255,255,255,.09);--glass-3:rgba(255,255,255,.14);
  --gline:rgba(255,255,255,.12);--gline-2:rgba(255,255,255,.18);--card:rgba(255,255,255,.05);
  --disp:'Space Grotesk',sans-serif;
  --safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;overscroll-behavior:none;}
button{font-family:inherit;border:none;background:none;color:inherit;cursor:pointer;}
input{font-family:inherit;}
::-webkit-scrollbar{width:0;height:0;}
#root{max-width:466px;margin:0 auto;min-height:100vh;min-height:100dvh;position:relative;
  overflow:hidden;display:flex;flex-direction:column;background:var(--bg);}
.glow{position:absolute;border-radius:50%;filter:blur(82px);z-index:0;pointer-events:none;}
.g1{width:340px;height:340px;background:rgba(255,61,127,.22);top:-130px;left:-120px;}
.g2{width:330px;height:330px;background:rgba(255,166,61,.2);top:30%;right:-170px;}
.g3{width:380px;height:380px;background:rgba(196,69,158,.2);bottom:-70px;left:-120px;}
.glass{background:var(--glass);-webkit-backdrop-filter:blur(22px) saturate(180%);
  backdrop-filter:blur(22px) saturate(180%);border:1px solid var(--gline);
  box-shadow:0 26px 50px -24px rgba(0,0,0,.92), inset 0 1px 0 rgba(255,255,255,.14);}
.card{background:var(--card);border:1px solid var(--gline);}
.btn{width:100%;padding:16px;border-radius:14px;font-size:15.5px;font-weight:700;
  transition:transform .08s;letter-spacing:-.01em;}
.btn:active{transform:scale(.985);}
.btn:disabled{opacity:.5;}
.btn-primary{background:var(--lime);color:#0A0D14;}
.btn-ghost{background:var(--glass-2);color:var(--text);border:1px solid var(--gline);}
.btn-danger{background:rgba(255,90,120,.13);color:var(--live);border:1px solid rgba(255,90,120,.32);}

/* LOGIN */
.login{flex:1;display:flex;flex-direction:column;position:relative;z-index:1;
  padding:calc(var(--safe-t) + 10px) 26px calc(var(--safe-b) + 28px);}
.login-top{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
.trophy-badge{width:92px;height:92px;border-radius:27px;display:flex;align-items:center;
  justify-content:center;margin-bottom:22px;}
.kicker{font-size:11px;font-weight:700;letter-spacing:.32em;color:var(--lime);text-transform:uppercase;}
.wordmark{font-family:var(--disp);font-size:52px;font-weight:700;letter-spacing:-.03em;line-height:.95;margin-top:7px;}
.wordmark .y{color:var(--lime);}
.login-sub{font-size:14.5px;color:var(--text-2);max-width:290px;line-height:1.55;margin-top:13px;}
.auth-form{position:relative;z-index:1;display:flex;flex-direction:column;gap:11px;}
.field-lbl{font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--text-3);
  text-transform:uppercase;margin:4px 2px -3px;}
.field{width:100%;background:var(--glass-2);border:1px solid var(--gline);border-radius:13px;
  padding:15px;font-size:16px;color:var(--text);font-weight:600;transition:border-color .15s;}
.field::placeholder{color:var(--text-3);font-weight:500;}
.field:focus{outline:none;border-color:var(--lime);}
.field.code{text-align:center;letter-spacing:.42em;font-family:var(--disp);font-size:22px;padding-right:0;}
.auth-msg{font-size:12.5px;color:var(--text-2);font-weight:500;line-height:1.5;text-align:center;padding:0 6px;}
.auth-msg b{color:var(--text);font-weight:700;}
.auth-err{font-size:12.5px;color:var(--live);font-weight:600;text-align:center;padding:2px 6px;}
.auth-link{font-size:12.5px;color:var(--text-2);font-weight:600;text-align:center;padding:8px;text-decoration:underline;}
.login-foot{position:relative;z-index:1;text-align:center;font-size:11.5px;color:var(--text-3);
  margin-top:15px;line-height:1.6;}

/* LOADING / ERROR */
.center-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;z-index:1;padding:30px;text-align:center;}
.spinner{width:42px;height:42px;border-radius:50%;border:3px solid var(--gline-2);
  border-top-color:var(--lime);animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.center-screen .cs-msg{font-size:13.5px;color:var(--text-2);font-weight:600;margin-top:18px;}
.err-card{border-radius:18px;padding:22px;max-width:330px;}
.err-card .ec-t{font-size:16px;font-weight:700;margin-bottom:7px;}
.err-card .ec-d{font-size:12.5px;color:var(--text-2);font-weight:500;line-height:1.5;margin-bottom:16px;word-break:break-word;}

/* SHELL */
.app{flex:1;display:flex;flex-direction:column;min-height:0;position:relative;z-index:1;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--safe-t) + 15px) 18px 12px;}
.brand{font-family:var(--disp);font-weight:700;font-size:18px;letter-spacing:-.01em;}
.brand .y{color:var(--lime);}
.tb-right{display:flex;align-items:center;gap:8px;}
.pts-pill{display:flex;align-items:center;gap:6px;background:rgba(255,181,77,.13);
  border:1px solid rgba(255,181,77,.3);border-radius:999px;padding:6px 12px 6px 11px;}
.pts-pill .pv{font-family:var(--disp);font-size:14px;font-weight:700;color:var(--lime);}
.pts-pill .pl{font-size:9.5px;font-weight:700;color:var(--text-3);letter-spacing:.08em;}
.icon-btn{width:38px;height:38px;border-radius:12px;background:var(--glass);border:1px solid var(--gline);
  display:flex;align-items:center;justify-content:center;color:var(--text-2);}
.icon-btn svg{width:18px;height:18px;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:2px 16px 120px;}
.nav{position:sticky;bottom:0;z-index:6;display:flex;margin:0 14px;
  border-radius:20px 20px 0 0;padding:11px 8px calc(var(--safe-b) + 11px);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--text-3);padding:3px 0;}
.nav-item.on{color:var(--lime);}
.nav-item svg{width:22px;height:22px;}
.nav-item span{font-size:10px;font-weight:700;}
.sec-lbl{display:flex;align-items:center;gap:10px;margin:24px 4px 13px;
  font-size:10.5px;font-weight:700;letter-spacing:.15em;color:var(--text-3);}
.sec-lbl::after{content:"";flex:1;height:1px;background:var(--gline);}

/* HOME */
.identity{border-radius:22px;padding:15px 16px;display:flex;align-items:center;gap:13px;margin-top:6px;}
.ava{width:52px;height:52px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;
  font-family:var(--disp);font-weight:700;font-size:20px;color:#1A0A10;
  background:linear-gradient(150deg,#FFC76A,#FF9D54);box-shadow:0 10px 22px -8px rgba(255,181,77,.55);}
.id-info{flex:1;min-width:0;}
.id-info .nm{font-size:17px;font-weight:700;letter-spacing:-.01em;}
.id-info .em{font-size:11.5px;color:var(--text-3);font-weight:500;margin-top:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rank-pill{display:inline-flex;align-items:center;gap:4px;margin-top:6px;
  background:rgba(255,203,69,.12);border:1px solid rgba(255,203,69,.3);
  color:var(--gold);font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:999px;}
.id-pts{text-align:right;flex:none;}
.id-pts .pv{font-family:var(--disp);font-weight:700;font-size:29px;color:var(--lime);line-height:1;letter-spacing:-.02em;}
.id-pts .pl{font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--text-3);margin-top:3px;}
.hero-row{display:flex;gap:11px;}
.hero{flex:1;border-radius:22px;padding:14px 13px;position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;
  transition:transform .18s cubic-bezier(.2,.8,.2,1);
  transform:perspective(720px) rotateX(0) rotateY(0);will-change:transform;}
.hero .sheen{position:absolute;inset:0;pointer-events:none;border-radius:22px;transition:background .1s;}
.hero-gold{box-shadow:0 30px 52px -22px rgba(0,0,0,.95), inset 0 1px 0 rgba(255,255,255,.16), inset 0 -62px 58px -48px rgba(255,181,77,.46);}
.hero-lime{box-shadow:0 30px 52px -22px rgba(0,0,0,.95), inset 0 1px 0 rgba(255,255,255,.16), inset 0 -62px 58px -48px rgba(255,77,158,.42);}
.hero-top{display:flex;align-items:center;width:100%;margin-bottom:12px;}
.hero-cat{font-size:9.5px;font-weight:700;letter-spacing:.1em;}
.hero-cat.gold{color:var(--gold);}
.hero-cat.lime{color:var(--violet);}
.hero-pts{margin-left:auto;font-family:var(--disp);font-size:10.5px;font-weight:700;padding:4px 8px;border-radius:8px;}
.hp-gold{background:rgba(255,203,69,.15);color:var(--gold);}
.hp-lime{background:rgba(255,77,158,.16);color:var(--violet);}
.pslot{position:relative;border-radius:50%;background:var(--glass-2);border:1px solid var(--gline-2);
  display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-weight:700;color:var(--text-2);}
.pslot .pslot-flag{position:absolute;bottom:-1px;right:-1px;width:38%;height:38%;border-radius:50%;
  object-fit:cover;border:2px solid #131722;background:#11151f;}
.flag-panel{width:104px;height:74px;border-radius:14px;overflow:hidden;
  border:1px solid var(--gline-2);box-shadow:0 12px 24px -10px rgba(0,0,0,.7);background:#11151f;}
.flag-panel img{width:100%;height:100%;object-fit:cover;display:block;}
.pick-name{font-size:14.5px;font-weight:700;letter-spacing:-.01em;text-align:center;margin-top:10px;}
.pick-sub{display:flex;align-items:center;gap:5px;justify-content:center;
  font-size:11px;color:var(--text-2);font-weight:500;margin-top:3px;text-align:center;}
.pick-sub img{width:15px;height:10px;border-radius:2px;object-fit:cover;}
.hero-cta{margin-top:12px;width:100%;padding:8px;border-radius:11px;background:var(--glass-2);
  border:1px solid var(--gline);font-size:11px;font-weight:700;color:var(--text-2);
  display:flex;align-items:center;justify-content:center;gap:4px;}
.hero-cta svg{width:12px;height:12px;}
.stat-row{display:flex;gap:10px;margin-top:11px;}
.stat{flex:1;border-radius:15px;padding:13px 10px;}
.stat .sv{font-family:var(--disp);font-weight:700;font-size:20px;letter-spacing:-.02em;}
.stat .sv.lime{color:var(--lime);}.stat .sv.gold{color:var(--gold);}.stat .sv.violet{color:var(--violet);}
.stat .sl{font-size:10px;font-weight:600;color:var(--text-3);margin-top:3px;}
.panel{border-radius:19px;padding:15px 16px;margin-top:11px;}
.panel-t{font-size:10.5px;font-weight:700;letter-spacing:.13em;color:var(--text-3);margin-bottom:13px;}
.bd-row{display:flex;align-items:center;gap:11px;margin-bottom:11px;}
.bd-row:last-child{margin-bottom:0;}
.bd-lbl{width:78px;font-size:12px;font-weight:600;color:var(--text-2);}
.bd-bar{flex:1;height:8px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden;}
.bd-bar i{display:block;height:100%;border-radius:99px;}
.bd-v{font-family:var(--disp);font-weight:700;font-size:13.5px;min-width:24px;text-align:right;}
.form-row{display:flex;align-items:center;gap:9px;padding:10px 0;border-bottom:1px solid var(--gline);}
.form-row:first-of-type{padding-top:1px;}
.form-row:last-child{border-bottom:none;padding-bottom:1px;}
.fr-flag{width:23px;height:16px;border-radius:4px;object-fit:cover;flex:none;border:1px solid var(--gline);background:#11151f;}
.fr-code{font-size:12px;font-weight:700;}
.fr-score{font-family:var(--disp);font-weight:700;font-size:14px;background:rgba(255,255,255,.06);border-radius:7px;padding:2px 8px;}
.fr-spacer{flex:1;}
.fr-chip{font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;font-family:var(--disp);}
.chip-exact{background:rgba(255,181,77,.17);color:var(--lime);}
.chip-ok{background:rgba(63,227,140,.14);color:var(--green);}
.chip-miss{background:rgba(255,255,255,.06);color:var(--text-3);}
.menu-item{width:100%;display:flex;align-items:center;gap:12px;padding:14px 15px;border-radius:14px;
  margin-top:9px;font-size:13.5px;font-weight:600;text-align:left;}
.menu-item .mi-ic{width:19px;height:19px;display:flex;color:var(--text-2);}
.menu-item .mi-spc{flex:1;}
.menu-item .mi-chev{width:15px;height:15px;color:var(--text-3);}
.menu-item.admin{border-color:rgba(255,203,69,.28);}
.menu-item.admin .mi-ic,.menu-item.admin .mi-spc{color:var(--gold);}

/* MATCHES */
.progress{border-radius:17px;padding:13px 15px;margin-top:8px;display:flex;align-items:center;gap:13px;}
.progress .pw-t{flex:1;}
.progress .pw-t b{font-size:13.5px;font-weight:700;}
.progress .pw-t span{font-size:11.5px;color:var(--text-2);font-weight:500;display:block;margin-top:1px;}
.pbar{height:7px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden;margin-top:9px;}
.pbar i{display:block;height:100%;background:var(--lime);border-radius:99px;transition:width .4s;}
.pw-ring{font-family:var(--disp);font-size:19px;font-weight:700;color:var(--lime);}
.chips{display:flex;gap:8px;overflow-x:auto;padding:14px 4px 4px;margin:0 -4px;}
.chip{flex:none;padding:9px 14px;border-radius:999px;font-size:12.5px;font-weight:700;
  background:var(--card);border:1px solid var(--gline);color:var(--text-2);white-space:nowrap;}
.chip.on{background:var(--lime);color:#0A0D14;border-color:var(--lime);}
.chip .ct{opacity:.6;margin-left:3px;font-weight:700;}
.date-head{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  color:var(--text-3);margin:21px 6px 10px;display:flex;align-items:center;gap:9px;}
.date-head::after{content:"";flex:1;height:1px;background:var(--gline);}
.match-card{border-radius:18px;margin-bottom:11px;overflow:hidden;box-shadow:0 18px 34px -26px rgba(0,0,0,.9);}
.match-card.is-live{border-color:rgba(255,90,120,.4);}
.mc-top{display:flex;align-items:center;justify-content:space-between;padding:11px 14px 0;}
.grp-badge{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  color:var(--text-2);background:var(--glass-2);padding:4px 9px;border-radius:7px;}
.mc-status{font-size:11px;font-weight:700;}
.mc-status.up{color:var(--text-2);}
.mc-status.live{color:var(--live);display:flex;align-items:center;gap:5px;}
.mc-status.done{color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--live);animation:pulse 1.4s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.25;}}
.mc-body{display:flex;align-items:flex-start;padding:13px 10px 4px;gap:5px;}
.mteam{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;padding-top:5px;min-width:0;}
.tflag{width:48px;height:34px;border-radius:8px;object-fit:cover;border:1px solid var(--gline-2);
  background:#11151f;box-shadow:0 7px 14px -7px rgba(0,0,0,.7);}
.tname{font-size:12.5px;font-weight:700;text-align:center;line-height:1.2;letter-spacing:-.01em;}
.mc-mid{flex:none;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:126px;}
.predictor{display:flex;align-items:center;gap:5px;}
.stepper{display:flex;flex-direction:column;align-items:center;gap:3px;}
.stepbtn{width:42px;height:25px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  color:var(--text-2);background:var(--glass-2);border:1px solid var(--gline);}
.stepbtn:active{background:var(--lime);color:#0A0D14;}
.stepbtn svg{width:14px;height:14px;}
.digit{font-family:var(--disp);font-size:31px;font-weight:700;width:44px;height:42px;text-align:center;
  display:flex;align-items:center;justify-content:center;letter-spacing:-.02em;}
.unpicked .digit{color:var(--text-3);}
.colon{font-family:var(--disp);font-size:21px;font-weight:700;color:var(--text-3);padding-bottom:3px;}
.hint{font-size:10px;font-weight:700;color:var(--text-3);margin-top:6px;}
.hint.ok{color:var(--lime);}
.bigscore{display:flex;align-items:center;gap:9px;font-family:var(--disp);font-size:35px;font-weight:700;letter-spacing:-.03em;}
.bigscore .sep{color:var(--text-3);font-size:24px;}
.score-cap{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-3);margin-top:4px;}
.pickline{margin:6px 12px 0;padding:9px 12px;border-radius:11px;background:var(--glass-2);
  display:flex;align-items:center;gap:10px;justify-content:space-between;}
.pickline .pl-l{font-size:12px;font-weight:600;color:var(--text-2);}
.pickline .pl-l b{color:var(--text);font-weight:700;}
.result-chip{font-size:11px;font-weight:700;padding:5px 10px;border-radius:999px;white-space:nowrap;font-family:var(--disp);}
.rc-exact{background:rgba(255,181,77,.17);color:var(--lime);}
.rc-ok{background:rgba(63,227,140,.14);color:var(--green);}
.rc-miss{background:rgba(255,255,255,.06);color:var(--text-3);}
.rc-lock{background:rgba(255,255,255,.07);color:var(--text-2);}
.bonus-toggle{width:100%;display:flex;align-items:center;gap:8px;padding:12px 14px;
  font-size:12px;font-weight:700;color:var(--text-2);border-top:1px solid var(--gline);margin-top:9px;}
.bonus-toggle .bt-zap{color:var(--gold);width:15px;height:15px;display:flex;}
.bonus-toggle .bt-spc{flex:1;}
.bonus-toggle .bt-av{color:var(--gold);}
.bonus-toggle .bt-chev{width:15px;height:15px;color:var(--text-3);transition:transform .2s;}
.bonus-toggle.open .bt-chev{transform:rotate(180deg);}
.bonus-panel{padding:3px 14px 14px;display:flex;flex-direction:column;gap:12px;}
.bonus-q .bq-label{font-size:12px;font-weight:600;margin-bottom:7px;}
.seg{display:flex;gap:6px;}
.seg button{flex:1;padding:9px 4px;border-radius:9px;font-size:11.5px;font-weight:700;line-height:1.15;
  background:var(--glass-2);border:1px solid var(--gline);color:var(--text-2);}
.seg button.sel{background:var(--lime);color:#0A0D14;border-color:var(--lime);}
.seg button.correct{background:rgba(63,227,140,.16);border-color:var(--green);color:var(--green);}
.seg button.wrong{background:rgba(255,90,120,.14);border-color:rgba(255,90,120,.4);color:var(--live);}
.seg button.dim{opacity:.45;}
.bonus-note{font-size:11px;color:var(--text-3);font-weight:500;text-align:center;padding:3px 0;}

/* TABLE */
.podium{display:flex;align-items:flex-end;gap:9px;margin:16px 2px 4px;}
.pod{flex:1;border-radius:18px;padding:13px 7px 13px;display:flex;flex-direction:column;
  align-items:center;gap:5px;position:relative;}
.pod.p1{padding-top:19px;box-shadow:0 20px 42px -22px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.12), inset 0 -50px 50px -46px rgba(255,203,69,.4);}
.pod-rank{position:absolute;top:-11px;width:23px;height:23px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-size:11px;font-weight:700;
  border:2px solid var(--bg);}
.pod.p1 .pod-rank{background:var(--gold);color:#0A0D14;}
.pod.p2 .pod-rank{background:#C7CEDC;color:#0A0D14;}
.pod.p3 .pod-rank{background:#E0935A;color:#0A0D14;}
.pod-name{font-size:12px;font-weight:700;text-align:center;}

function matchState(m){

}

function bonusActual(id){
  var r=RESULTS[id];if(!r||r.live)return null;
  var fh=r.ht[0]>r.ht[1]?'t1':(r.ht[0]<r.ht[1]?'t2':'draw');
  return {fh:fh,corners:r.corners>11?'over':'under',pen:r.pen?'yes':'no',red:r.red?'yes':'no',first:r.first};
}
function calcPoints(pred,id){
  var r=RESULTS[id];
  if(!r||r.live||!pred)return null;
  var ph,pa;
  if(pred.score){ph=pred.score[0];pa=pred.score[1];}
  else{ph=pred.score_home;pa=pred.score_away;}
  if(ph==null||pa==null)return null;
  var bonus=pred.bonus||{};
  var rp=0,aa=r.score[0],ab=r.score[1];
  if(ph===aa&&pa===ab)rp=PTS.EXACT;
  else if(Math.sign(ph-pa)===Math.sign(aa-ab))rp=PTS.OUTCOME;
  var bp=0,act=bonusActual(id);
  BONUS_DEFS.forEach(function(d){if(bonus[d.k]&&bonus[d.k]===act[d.k])bp++;});
  return {rp:rp,bp:bp,total:rp+bp,exact:rp===PTS.EXACT};
}
function matchPoints(id){return calcPoints(state.picks[id],id);}
function userTotals(){
  var t={total:0,res:0,bonus:0,exact:0,predicted:0};
  for(var id in state.picks){if(state.picks[id]&&state.picks[id].score)t.predicted++;}
  MATCHES.forEach(function(m){var mp=matchPoints(m.id);
    if(mp){t.total+=mp.total;t.res+=mp.rp;t.bonus+=mp.bp;if(mp.exact)t.exact++;}});
  return t;
}
function leaderboard(){

    return {id:pr.id,name:pr.display_name||'Player',pts:pts,exact:exact,me:(state.user&&pr.id===state.user.id)};
  });

  rows.sort(function(a,b){return b.pts-a.pts || String(a.name).localeCompare(String(b.name));});
  rows.forEach(function(r,i){r.rank=i+1;});
  return rows;
}

async function sendCode(email){
  email=String(email||'').trim();
  if(!email||email.indexOf('@')<1){ui.authErr='Enter a valid email address.';renderApp();return;}
  ui.authBusy=true;ui.authErr='';renderApp();
  try{
    var res=await sb.auth.signInWithOtp({email:email,options:{shouldCreateUser:true}});
    ui.authBusy=false;
    if(res.error){ui.authErr=res.error.message;renderApp();return;}
    ui.authEmail=email;ui.authStep='code';ui.authErr='';renderApp();
  }catch(e){ui.authBusy=false;ui.authErr=(e&&e.message)||'Network error — try again.';renderApp();}
}
async function verifyCode(token){
  token=String(token||'').replace(/\s/g,'');
  if(token.length<4){ui.authErr='Enter the code from your email.';renderApp();return;}
  ui.authBusy=true;ui.authErr='';renderApp();

/* ════════ DATA ════════ */
async function loadData(){
  var r=await Promise.all([
    sb.from('matches').select('*').order('id'),
    sb.from('scorers').select('*').eq('active',true),
    sb.from('profiles').select('*'),
    sb.from('predictions').select('*'),
    sb.from('tournament_picks').select('*')
  ]);
  for(var i=0;i<r.length;i++){if(r[i].error)throw new Error(r[i].error.message);}
  data.matches=r[0].data||[];data.scorers=r[1].data||[];data.profiles=r[2].data||[];
  data.predictions=r[3].data||[];data.tournament=r[4].data||[];
  buildFromDB();
  state.profile=data.profiles.filter(function(p){return p.id===state.user.id;})[0]||
    {id:state.user.id,display_name:(state.user.email||'Player').split('@')[0],email:state.user.email};
  state.picks={};
  data.predictions.filter(function(p){return p.user_id===state.user.id;}).forEach(function(p){
    state.picks[p.match_id]={score:[p.score_home,p.score_away],bonus:p.bonus||{}};
  });
  var mine=data.tournament.filter(function(t){return t.user_id===state.user.id;})[0];
  state.champion=mine?mine.champion:null;
  state.scorer=mine?mine.top_scorer:null;
}
function buildFromDB(){
  MATCHES=data.matches.map(function(r){
    return {id:r.id,grp:r.grp,t1:r.team1,t2:r.team2,ko:new Date(r.kickoff).getTime(),
            city:r.city,md:r.matchday,status:r.status};
  });
  MATCHES.sort(function(a,b){return a.id-b.id;});
  RESULTS={};
  data.matches.forEach(function(r){
    if(r.status==='finished'&&r.score_home!=null){
      RESULTS[r.id]={score:[r.score_home,r.score_away],ht:[r.ht_home||0,r.ht_away||0],
        corners:r.corners||0,pen:!!r.pen,red:!!r.red,first:r.first_scorer||'none'};
    }else if(r.status==='live'){
      RESULTS[r.id]={live:true,score:[r.score_home||0,r.score_away||0]};
    }
  });
  SCORERS=data.scorers.slice();
}
async function boot(){
  ui.screen='loading';renderApp();
  try{
    await loadData();
    ui.screen='app';ui.tab='home';renderApp();
    loadPhotos();
    /* auto-refresh every 90 s so table + results stay current */
    setInterval(async function(){
      try{await loadData();rerender();}catch(e){}
    },90000);
  }catch(e){
    ui.screen='error';ui.errMsg=(e&&e.message)||String(e);renderApp();
  }
}

var saveTimers={};
function savePrediction(matchId){
  var p=state.picks[matchId];if(!p||!p.score||!state.user)return;
  clearTimeout(saveTimers[matchId]);
  saveTimers[matchId]=setTimeout(async function(){
    var row={user_id:state.user.id,match_id:matchId,score_home:p.score[0],
      score_away:p.score[1],bonus:p.bonus||{},updated_at:new Date().toISOString()};
    try{
      var res=await sb.from('predictions').upsert(row,{onConflict:'user_id,match_id'});
      if(res.error){toast('Could not save — '+res.error.message);return;}
      var ex=data.predictions.filter(function(x){return x.user_id===row.user_id&&x.match_id===matchId;})[0];
      if(ex){ex.score_home=row.score_home;ex.score_away=row.score_away;ex.bonus=row.bonus;}
      else data.predictions.push({user_id:row.user_id,match_id:matchId,score_home:row.score_home,
        score_away:row.score_away,bonus:row.bonus});
    }catch(e){toast('Could not save — check your connection');}
  },800);
}
async function saveTournament(){
  if(!state.user)return;
  var row={user_id:state.user.id,champion:state.champion,top_scorer:state.scorer,
    updated_at:new Date().toISOString()};
  try{
    var res=await sb.from('tournament_picks').upsert(row,{onConflict:'user_id'});
    if(res.error)toast('Could not save — '+res.error.message);
  }catch(e){toast('Could not save — check your connection');}
}
async function saveName(nv){
  if(!state.user)return false;
  try{
    var res=await sb.from('profiles').update({display_name:nv}).eq('id',state.user.id);
    if(res.error){toast('Could not save name');return false;}
    state.profile.display_name=nv;
    var p=data.profiles.filter(function(x){return x.id===state.user.id;})[0];
    if(p)p.display_name=nv;
    return true;
  }catch(e){toast('Could not save name');return false;}
}

function midOf(m,st,pick,r){

function stepper(id,side,val){

function pickLine(m,st,pick){
  if(st==='open')return '';
  if(!pick||!pick.score)return '<div class="pickline"><span class="pl-l">No prediction made</span><span class="result-chip rc-miss">0</span></div>';
  var ps=pick.score[0]+'–'+pick.score[1];
  if(st==='live'||st==='inplay')return '<div class="pickline"><span class="pl-l">Your pick <b>'+ps+'</b></span><span class="result-chip rc-lock">🔒 Locked</span></div>';
  var mp=matchPoints(m.id),chip,cls;
  if(!mp){chip='0';cls='rc-miss';}
  else if(mp.rp===PTS.EXACT){chip='Exact · +'+mp.total;cls='rc-exact';}
  else if(mp.rp===PTS.OUTCOME){chip='Outcome · +'+mp.total;cls='rc-ok';}
  else{chip=mp.total>0?'+'+mp.total:'0 pts';cls=mp.total>0?'rc-ok':'rc-miss';}
  return '<div class="pickline"><span class="pl-l">Your pick <b>'+ps+'</b>'+(mp?' · '+mp.rp+' result + '+mp.bp+' bonus':'')+'</span>'+
    '<span class="result-chip '+cls+'">'+chip+'</span></div>';
}
function bonusBlock(m,st,pick){
  var open=!!ui.expanded[m.id];
  var ans=0;if(pick&&pick.bonus)BONUS_DEFS.forEach(function(d){if(pick.bonus[d.k])ans++;});
  var label,av='';
  if(st==='done'){
    var act=bonusActual(m.id),cor=0;
    if(pick&&pick.bonus)BONUS_DEFS.forEach(function(d){if(pick.bonus[d.k]===act[d.k])cor++;});
    label='Bonus · '+cor+'/5 correct';av='<span class="bt-av">+'+cor+'</span>';
  }else if(st==='live'||st==='inplay')label='Bonus · '+ans+'/5 · locked';
  else{label='Bonus questions · '+ans+'/5 answered';av='<span class="bt-av">+5</span>';}
  var h='<button class="bonus-toggle'+(open?' open':'')+'" data-bonus="'+m.id+'">'+
    '<span class="bt-zap">'+I.fire+'</span><span class="bt-spc">'+label+'</span>'+av+
    '<span class="bt-chev">'+I.chevd+'</span></button>';
  if(open)h+=bonusPanel(m,st,pick);
  return h;
}
function bonusPanel(m,st,pick){
  var act=(st==='done')?bonusActual(m.id):null;
  var b=(pick&&pick.bonus)?pick.bonus:{};
  var h='<div class="bonus-panel">';
  BONUS_DEFS.forEach(function(d){
    h+='<div class="bonus-q"><div class="bq-label">'+d.q+'</div><div class="seg" data-q="'+d.k+'" data-m="'+m.id+'">';
    d.opts(m).forEach(function(o){
      var v=o[0],c='';
      if(st==='done'){if(act[d.k]===v)c=' correct';else if(b[d.k]===v)c=' wrong';else c=' dim';}
      else if(b[d.k]===v)c=' sel';
      h+='<button class="bonus-opt'+c+'" data-v="'+v+'">'+esc(o[1])+'</button>';
    });
    h+='</div></div>';
  });
  if(st==='live'||st==='inplay')h+='<div class="bonus-note">🔒 Locked at kickoff — settled after full time.</div>';
  else if(st==='done')h+='<div class="bonus-note">Green = correct answer · each hit = +1 point.</div>';
  return h+'</div>';
}

  var rows=leaderboard();
  var h='<div class="sec-lbl">LEAGUE STANDINGS</div>';
  if(rows.length>=3){
    var top3=rows.slice(0,3),order=[top3[1],top3[0],top3[2]];
    h+='<div class="podium">';
    order.forEach(function(r){
      if(!r)return;
      h+='<div class="pod glass p'+r.rank+'"><div class="pod-rank">'+r.rank+'</div>'+
        '<div class="lb-av" style="width:'+(r.rank===1?46:40)+'px;height:'+(r.rank===1?46:40)+'px;background:'+avGrad(r.name)+'">'+initials(r.name)+'</div>'+
        '<div class="pod-name">'+esc(r.name)+(r.me?' <span class="you-tag">YOU</span>':'')+'</div>'+
        '<div class="pod-pts'+(r.rank===1?' gold':'')+'">'+r.pts+'</div><small>points</small></div>';
    });
    h+='</div>';
  }
  var rest=rows.length>=3?rows.slice(3):rows;
  h+='<div class="lb-list">';
  rest.forEach(function(r){
    h+='<div class="lbrow card'+(r.me?' me':'')+'"><div class="lb-rank">'+r.rank+'</div>'+
      '<div class="lb-av" style="background:'+avGrad(r.name)+'">'+initials(r.name)+'</div>'+
      '<div class="lb-name">'+esc(r.name)+(r.me?' <span class="you-tag">YOU</span>':'')+
      '<span class="lb-sub">'+r.exact+' exact score'+(r.exact===1?'':'s')+'</span></div>'+
      '<div class="lb-pts">'+r.pts+'</div></div>';
  });
  h+='</div>';
  if(rows.length<2)
    h+='<div class="empty" style="padding-top:20px"><div class="ee">👋</div><b>It\'s just you so far</b>'+
       '<span>Invite friends from the Home tab to fill the table.</span></div>';
  h+='<div class="foot">Standings update automatically as matches are settled.</div>';
  return h;
}

/* ════════ SHEETS ════════ */
function openSheet(title,body){
  $('sheet').innerHTML='<div class="sheet-grip"></div>'+
    '<div class="sheet-head"><b>'+title+'</b><button class="sheet-x" data-act="closesheet">'+ic(I.x,15)+'</button></div>'+
    '<div class="sheet-body">'+body+'</div>';
  $('sheetBack').classList.add('on');
}
function closeSheet(){$('sheetBack').classList.remove('on');}
function sheetChampion(){
  var b='';
  Object.keys(GROUPS).forEach(function(g){
    b+='<div class="grp-lbl">Group '+g+'</div><div class="team-grid">';
    GROUPS[g].forEach(function(c){
      b+='<button class="team-tile'+(state.champion===c?' sel':'')+'" data-team="'+c+'">'+
        flag(c,'')+'<span class="tt-nm">'+esc(teamName(c))+'</span></button>';
    });
    b+='</div>';
  });
  openSheet('Pick the Champion',b);
}
function sheetScorer(){
  var b='';
  if(!SCORERS.length)b='<div class="empty"><b>No candidates yet</b></div>';
  SCORERS.forEach(function(s){
    b+='<button class="scorer-row'+(state.scorer===s.id?' sel':'')+'" data-scorer="'+s.id+'">'+
      playerSlot(s,44)+
      '<div class="sr-info"><b>'+esc(s.name)+'</b><span>'+flag(s.team,'')+esc(teamName(s.team))+'</span></div>'+
      '<span class="sr-odds">'+esc(s.odds||'')+'</span>'+
      '<span class="sr-check">'+(state.scorer===s.id?ic(I.check,12):'')+'</span></button>';
  });
  openSheet('Pick the Golden Boot',b);
}
function sheetRules(){
  var b='<div style="font-size:12.5px;color:var(--text-2);font-weight:500;margin-bottom:4px">Score every match — bonus questions and tournament calls stack on top.</div>'+
    '<div class="admin-sec-t">Match score</div>'+
    rl(5,'<b>Exact score.</b> The precise final result.','')+
    rl(3,'<b>Right outcome.</b> Correct winner or draw, wrong score.','')+
    rl(0,'<b>Wrong.</b> Outcome missed.','')+
    '<div class="admin-sec-t">Bonus questions</div>'+
    rl(1,'<b>Each correct bonus answer.</b> 5 per match — up to +5.','')+
    '<div class="admin-sec-t">Tournament</div>'+
    rl(15,'<b>World Cup champion</b> predicted right.','gold')+
    rl(10,'<b>Golden Boot</b> top scorer predicted right.','gold')+
    '<div style="font-size:11.5px;color:var(--text-3);font-weight:500;margin-top:13px">Predictions lock automatically at kickoff.</div>';
  openSheet('How scoring works',b);
}
function rl(p,txt,cls){
  return '<div class="rule-line"><div class="rule-pts'+(cls?' '+cls:'')+'">'+(p>0?'+'+p:'0')+'</div><div class="rl-txt">'+txt+'</div></div>';
}
function sheetEditName(){
  openSheet('Edit display name',
    '<input class="field" id="enInput" value="'+esc((state.profile&&state.profile.display_name)||'')+'" maxlength="24" />'+
    '<button class="btn btn-primary" id="enSave" style="margin-top:13px">Save name</button>');
}
function sheetInvite(){
  var link=location.href.split('#')[0];
  var b='<div style="font-size:13px;color:var(--text-2);font-weight:500;line-height:1.55;margin-bottom:14px">'+
    'Anyone who opens this link can sign in with their email and join the same league automatically.</div>'+
    '<div class="admin-sec-t">League link</div>'+
    '<div class="share-box">'+esc(link)+'</div>'+
    '<button class="btn btn-primary" id="copyLink" style="margin-top:12px">Copy link</button>';
  openSheet('Invite friends',b);
}
function sheetLeave(){
  openSheet('Sign out?',
    '<div style="font-size:13.5px;color:var(--text-2);font-weight:500;line-height:1.55;margin-bottom:17px">'+
    'Your predictions are saved to your account — sign back in any time with the same email and they\'ll be right here.</div>'+
    '<button class="btn btn-danger" id="leaveYes">Sign out</button>'+
    '<button class="btn btn-ghost" data-act="closesheet" style="margin-top:9px">Stay signed in</button>');
}

/* ════════ INTERACTIONS ════════ */
function stepChange(id,side,dir){
  var p=state.picks[id];
  if(!p||!p.score){p={score:[0,0],bonus:{}};state.picks[id]=p;}
  if(!p.bonus)p.bonus={};
  var v=p.score[side]+dir;if(v<0)v=0;if(v>19)v=19;p.score[side]=v;
  savePrediction(id);
}
function setBonus(id,q,v){
  var p=state.picks[id];
  if(!p||!p.score){p={score:[0,0],bonus:{}};state.picks[id]=p;}
  if(!p.bonus)p.bonus={};
  if(p.bonus[q]===v)delete p.bonus[q];else p.bonus[q]=v;
  savePrediction(id);
}
function handleClick(e){
  var t=e.target;
  function up(s){return t.closest?t.closest(s):null;}

  /* auth */
  if(up('#authBtn')){
    var v=($('authInput')||{}).value||'';
    if(ui.authStep==='code')verifyCode(v);else sendCode(v);
    return;
  }
  if(up('[data-act="backToEmail"]')){ui.authStep='email';ui.authErr='';ui.authBusy=false;renderApp();return;}
  if(up('[data-act="retry"]')){if(state.user)boot();else{ui.screen='login';renderApp();}return;}

  /* sheet */
  if(t.id==='sheetBack'||up('[data-act="closesheet"]')){closeSheet();return;}
  if(up('[data-act="rules"]')){sheetRules();return;}

  /* nav */
  var nav=up('.nav-item');
  if(nav){ui.tab=nav.getAttribute('data-tab');renderApp();var s=$('scroll');if(s)s.scrollTop=0;return;}

  /* matches */
  var chip=up('.chip');
  if(chip){ui.filter=chip.getAttribute('data-filter');rerender();return;}
  var sb_=up('.stepbtn');
  if(sb_){stepChange(+sb_.getAttribute('data-m'),+sb_.getAttribute('data-side'),sb_.getAttribute('data-step')==='up'?1:-1);rerender();return;}
  var bt=up('.bonus-toggle');
  if(bt){var bid=bt.getAttribute('data-bonus');ui.expanded[bid]=!ui.expanded[bid];rerender();return;}
  var bo=up('.bonus-opt');
  if(bo){
    var seg=bo.closest('.seg'),mid=+seg.getAttribute('data-m'),mm=matchById(mid);
    if(!mm||matchState(mm)!=='open'){toast('🔒 Locked at kickoff');return;}
    setBonus(mid,seg.getAttribute('data-q'),bo.getAttribute('data-v'));rerender();return;
  }

  /* home */
  var hero=up('[data-pick]');
  if(hero){if(hero.getAttribute('data-pick')==='champion')sheetChampion();else sheetScorer();return;}
  var tile=up('.team-tile');
  if(tile){state.champion=tile.getAttribute('data-team');saveTournament();closeSheet();rerender();
    toast('Champion: '+teamName(state.champion),true);return;}
  var sr=up('.scorer-row');
  if(sr){state.scorer=sr.getAttribute('data-scorer');saveTournament();closeSheet();rerender();
    var pk=scorerById(state.scorer);toast('Golden Boot: '+(pk?pk.name:''),true);return;}
  var mi=up('.menu-item');
  if(mi){
    var act=mi.getAttribute('data-act');
    if(act==='rules')sheetRules();
    else if(act==='invite')sheetInvite();
    else if(act==='editname')sheetEditName();
    else if(act==='leave')sheetLeave();
    return;
  }
  if(up('#enSave')){
    var nv=($('enInput').value||'').trim();
    if(!nv){toast('Name can\'t be empty');return;}
    saveName(nv).then(function(ok){if(ok){closeSheet();rerender();toast('Name updated',true);}});
    return;
  }
  if(up('#copyLink')){
    var link=location.href.split('#')[0];
    if(navigator.clipboard&&navigator.clipboard.writeText)
      navigator.clipboard.writeText(link).then(function(){toast('Link copied',true);},function(){toast('Copy it manually above');});
    else toast('Copy it manually above');
    return;
  }
  if(up('#leaveYes')){doSignOut();return;}
}
function handleKey(e){
  if(e.key!=='Enter')return;
  if(ui.screen==='login'&&$('authBtn')){
    var v=($('authInput')||{}).value||'';
    if(ui.authStep==='code')verifyCode(v);else sendCode(v);
  }
}

/* ════════ 3D TILT ════════ */
function attachTilt(){
  var cards=document.querySelectorAll('[data-tilt]');
  for(var i=0;i<cards.length;i++){(function(card){
    var sheen=card.querySelector('.sheen');
    card.addEventListener('pointermove',function(e){
      var r=card.getBoundingClientRect();
      if(!r.width)return;
      var px=(e.clientX-r.left)/r.width-0.5,py=(e.clientY-r.top)/r.height-0.5;
      card.style.transform='perspective(760px) rotateX('+(-py*13).toFixed(2)+'deg) rotateY('+(px*13).toFixed(2)+'deg) translateZ(9px)';
      if(sheen)sheen.style.background='radial-gradient(170px circle at '+((px+0.5)*100).toFixed(1)+'% '+((py+0.5)*100).toFixed(1)+'%, rgba(255,255,255,.26), transparent 60%)';
    });
    function reset(){card.style.transform='perspective(720px) rotateX(0deg) rotateY(0deg) translateZ(0)';if(sheen)sheen.style.background='transparent';}
    card.addEventListener('pointerleave',reset);
    card.addEventListener('pointercancel',reset);
  })(cards[i]);}
}

/* ════════ INIT ════════ */
function fatal(msg){ui.screen='error';ui.errMsg=msg;renderApp();}
function init(){
  document.addEventListener('click',handleClick);
  document.addEventListener('keydown',handleKey);
  if(typeof supabase==='undefined'||!supabase.createClient){
    fatal('Could not load the Supabase library. Check your internet connection and reload.');
    return;
  }
  try{
    sb=supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
  }catch(e){fatal('Could not start the app: '+((e&&e.message)||e));return;}
  sb.auth.onAuthStateChange(function(event,session){handleAuth(event,session);});
  /* fallback in case onAuthStateChange does not fire an initial event */
  sb.auth.getSession().then(function(res){
    if(ui.screen==='boot'){
      if(res&&res.data&&res.data.session)handleAuth('INITIAL_SESSION',res.data.session);
      else{ui.screen='login';renderApp();}
    }
  }).catch(function(){if(ui.screen==='boot'){ui.screen='login';renderApp();}});
}
renderApp();
init();
</script>
